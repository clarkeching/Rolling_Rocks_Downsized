name: Auto-merge Claude branches

on:
  create:
  workflow_dispatch:

jobs:
  merge:
    if: github.event_name == 'workflow_dispatch' || (github.event.ref_type == 'branch' && startsWith(github.event.ref, 'claude/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge claude branches into main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          BRANCHES=$(git branch -r --list 'origin/claude/*')
          if [ -z "$BRANCHES" ]; then
            echo "No claude branches found"
            exit 0
          fi

          for BRANCH in $BRANCHES; do
            BRANCH_NAME=${BRANCH#origin/}
            echo "Merging $BRANCH_NAME into main..."
            git checkout main
            git pull origin main
            if git merge "$BRANCH" --no-edit; then
              git push origin main
              git push origin --delete "$BRANCH_NAME"
              echo "Merged and deleted $BRANCH_NAME"
            else
              echo "Merge conflict on $BRANCH_NAME — skipping"
              git merge --abort
            fi
          done
